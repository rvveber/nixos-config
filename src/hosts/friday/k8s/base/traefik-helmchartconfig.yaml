apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    service:
      spec:
        externalTrafficPolicy: Local
    ports:
      web:
        forwardedHeaders:
          trustedIPs:
          - 10.42.0.0/16
        proxyProtocol:
          trustedIPs:
          - 10.42.0.0/16
      websecure:
        forwardedHeaders:
          trustedIPs:
          - 10.42.0.0/16
        proxyProtocol:
          trustedIPs:
          - 10.42.0.0/16
